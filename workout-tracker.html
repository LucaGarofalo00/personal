<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#1a1a1a;
  --bg:#fafafa;--card:#ffffff;--card2:#f5f5f5;
  --border:#e8e8e8;--text:#111;--muted:#888;
  --ok:#16a34a;--err:#dc2626;--warn:#d97706;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1c1c1c;--card2:#222;
  --border:#2a2a2a;--text:#f0f0f0;--muted:#666;
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
.hdr-title span{color:var(--muted);font-weight:400}
.sync-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.sync-btn:hover{border-color:var(--acc);color:var(--acc)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sync-dot.ok{background:var(--ok)}.sync-dot.err{background:var(--err)}.sync-dot.ing{background:var(--warn);animation:blink .8s infinite}
.sync-status{font-size:10px;color:var(--muted);margin-top:5px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.nav{background:var(--card);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{padding:10px 14px;font-size:11px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.1px}
.nb.active{color:var(--text);border-bottom-color:var(--acc)}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:32px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.slabel{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--acc);color:#fff}.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--acc);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--acc)}
.btn-danger{background:none;color:var(--err);border:1px solid var(--border)}
.btn-light{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}.btn-full{width:100%;justify-content:center}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sgrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.sc{background:var(--card2);border-radius:var(--rs);padding:10px;text-align:center}
.sc-num{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.5px;line-height:1}
.sc-lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.sc-sub{font-size:10px;margin-top:2px;color:var(--muted)}
input,select,textarea{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-family:'Inter',sans-serif;font-size:13px;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
label{font-size:11px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px}
input[type=file]{display:none}
input[type=number]::-webkit-inner-spin-button{opacity:.5}
.pbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin:8px 0}
.pfill{height:100%;background:var(--acc);border-radius:99px;transition:width .4s ease}
.mbar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:4px}
.mfill{height:100%;border-radius:99px;transition:width .6s ease}
.day-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:none;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
.dtab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.ex-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:none;font-size:10px}
.ex-check.done{background:var(--acc);border-color:var(--acc);color:#fff}
.ex-info{flex:1;min-width:0}.ex-name{font-size:13px;font-weight:500}.ex-det{font-size:11px;color:var(--muted);margin-top:1px}
.ex-inputs{display:flex;gap:5px;align-items:center;flex-shrink:0}
.ex-inp{width:52px !important;padding:5px 6px !important;font-size:12px !important;text-align:center}
.rpe-row{display:flex;gap:3px;flex-wrap:wrap}
.rpe-btn{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;min-width:32px;text-align:center}
.rpe-btn.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap}
.emoji-btn{padding:6px 10px;border-radius:8px;font-size:18px;border:1.5px solid var(--border);background:none;cursor:pointer;transition:all .15s;line-height:1}
.emoji-btn.sel{background:var(--acc);border-color:var(--acc);transform:scale(1.1)}
.scale-row{display:flex;gap:4px}
.scale-btn{flex:1;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-align:center}
.scale-btn.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
.weather-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.weather-opt{padding:5px 10px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s}
.weather-opt.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.badge-def{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.badge-ok{background:rgba(22,163,74,.1);color:var(--ok)}
/* COACH CARDS */
.coach-card{border-radius:10px;padding:13px 14px;margin-bottom:8px;position:relative;overflow:hidden}
.coach-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.coach-card.focus{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2)}
.coach-card.focus::before{background:linear-gradient(90deg,#f59e0b,#f97316)}
.coach-card.workout{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2)}
.coach-card.workout::before{background:linear-gradient(90deg,#3b82f6,#6366f1)}
.coach-card.nutrition{background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.2)}
.coach-card.nutrition::before{background:linear-gradient(90deg,#16a34a,#22c55e)}
.coach-card.recovery{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2)}
.coach-card.recovery::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.coach-card.alert{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2)}
.coach-card.alert::before{background:linear-gradient(90deg,#dc2626,#f97316)}
.coach-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;opacity:.55}
.coach-text{font-size:13px;line-height:1.65;color:var(--text)}
/* MISURE */
.mis-table{width:100%;border-collapse:collapse;font-size:11px}
.mis-table th{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
.mis-table td{padding:6px 6px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.mis-table tr:last-child td{border-bottom:none}
.delta{font-size:9px;font-weight:600;margin-left:3px}
.delta.pos{color:var(--ok)}.delta.neg{color:var(--err)}.delta.neu{color:var(--muted)}
/* PROFILO STAT */
.pstat{background:var(--card2);border-radius:10px;padding:12px}
.pstat-val{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1}
.pstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pstat-sub{font-size:10px;color:var(--muted);margin-top:2px}
/* TIMER */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.timer-box{background:var(--card);border-radius:20px;padding:28px 24px;text-align:center;min-width:270px;border:1px solid var(--border)}
.timer-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.timer-display{font-size:60px;font-weight:300;color:var(--text);letter-spacing:-2px;line-height:1;margin:4px 0 16px}
.timer-display.warn{color:var(--warn)}.timer-display.done{color:var(--ok)}
.timer-presets{display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.t-pre{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.t-pre.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.timer-controls{display:flex;gap:8px;justify-content:center}
.timer-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:16px}
.timer-bar-fill{height:100%;background:var(--acc);border-radius:99px;transition:width .5s linear}
.log-row{padding:10px 0;border-bottom:1px solid var(--border)}.log-row:last-child{border-bottom:none}
.log-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.log-title{font-size:13px;font-weight:500}
.log-meta{font-size:11px;color:var(--muted);margin-top:2px}
.log-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;overflow-x:auto;scrollbar-width:none}
.log-tags::-webkit-scrollbar{display:none}
.cat-gym{border-left:2px solid #3b82f6}.cat-cali{border-left:2px solid #8b5cf6}
.cat-mtb{border-left:2px solid #f59e0b}.cat-trek{border-left:2px solid #10b981}
.chart-wrap{position:relative;height:190px;margin-top:10px}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-ico{font-size:32px;margin-bottom:10px;opacity:.5}
.empty h3{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px}
.empty p{font-size:12px}
.row{display:flex;gap:8px;align-items:center}
.row-sb{display:flex;justify-content:space-between;align-items:center}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:12px 0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
details summary{cursor:pointer;list-style:none;font-size:12px;font-weight:500;color:var(--muted);padding:6px 0;display:flex;align-items:center;justify-content:space-between}
details summary::after{content:'↓';font-size:10px;transition:transform .2s}
details[open] summary::after{transform:rotate(180deg)}
details summary::-webkit-details-marker{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-title">Workout <span>tracker</span></div>
      <button class="sync-btn" onclick="showSyncModal()" id="sync-btn">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Sync</span>
      </button>
    </div>
    <div class="sync-status" id="sync-status">Dati locali · configura GitHub in Impostazioni</div>
  </div>
  <div class="nav">
    <button class="nb active" onclick="goTab('gym')" id="tab-gym">Palestra</button>
    <button class="nb" onclick="goTab('cali')" id="tab-cali">Calisthenics</button>
    <button class="nb" onclick="goTab('outdoor')" id="tab-outdoor">Outdoor</button>
    <button class="nb" onclick="goTab('coach')" id="tab-coach">Coach AI</button>
    <button class="nb" onclick="goTab('profilo')" id="tab-profilo">Profilo</button>
    <button class="nb" onclick="goTab('progress')" id="tab-progress">Progressi</button>
    <button class="nb" onclick="goTab('history')" id="tab-history">Storico</button>
    <button class="nb" onclick="goTab('settings')" id="tab-settings">Impostazioni</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="timer-overlay" id="timer-overlay" style="display:none">
  <div class="timer-box">
    <div class="timer-lbl" id="timer-lbl">Recupero</div>
    <div class="timer-display" id="timer-disp">2:00</div>
    <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%"></div></div>
    <div class="timer-presets">
      <button class="t-pre" onclick="setTimer(60)">1'</button>
      <button class="t-pre" onclick="setTimer(90)">1'30</button>
      <button class="t-pre active" onclick="setTimer(120)">2'</button>
      <button class="t-pre" onclick="setTimer(180)">3'</button>
      <button class="t-pre" onclick="setTimer(300)">5'</button>
    </div>
    <div class="timer-controls">
      <button class="btn btn-light btn-sm" onclick="resetTimer()">Reset</button>
      <button class="btn btn-primary btn-sm" onclick="toggleTimer()" id="timer-btn">Start</button>
      <button class="btn btn-light btn-sm" onclick="closeTimer()">Chiudi</button>
    </div>
  </div>
</div>

<script>
const TODAY=new Date().toISOString().split('T')[0];
let DB={
  schedule:{},logs:[],rawText:'',gistId:'',gistToken:'',anthropicKey:'',lastSync:null,
  profile:{nome:'',sesso:'',eta:null,altezza:null,peso:null,grassoCorporeo:null,obiettivo:'',noteMediche:'',sport:''},
  misure:[],
  nutrition:{rawText:'',piano:''},
  diary:{}
};
let activeTab='gym',activeDayIdx=0,sessionData={},charts={};
let timerTotal=120,timerLeft=120,timerInterval=null,timerRunning=false;
let profiloTab='dash';
let newMisura={peso:'',vita:'',fianchi:'',petto:'',braccioDx:'',braccioSx:'',cosciaDx:'',cosciaSx:'',polpaccio:'',grassoCorporeo:''};
let caliExs=[{id:Date.now(),name:'',reps:'',notes:'',rpe:null}];
let oForm={type:'mtb',duration:'',distance:'',elevation:'',link:'',weather:'',notes:''};

// ── STORAGE ──
function loadLocal(){
  try{
    const s=localStorage.getItem('wt_v1');
    if(s){
      const sv=JSON.parse(s);
      DB={...DB,...sv};
      if(sv.profile) DB.profile={...DB.profile,...sv.profile};
      if(sv.nutrition) DB.nutrition={...DB.nutrition,...sv.nutrition};
      if(!DB.misure) DB.misure=[];
      if(!DB.diary) DB.diary={};
    }
    const ss=sessionStorage.getItem('wt_sess_'+TODAY);
    if(ss) sessionData=JSON.parse(ss);
  }catch(e){}
}
function saveLocal(){localStorage.setItem('wt_v1',JSON.stringify(DB));}
function saveSess(){sessionStorage.setItem('wt_sess_'+TODAY,JSON.stringify(sessionData));}

// ── SYNC ──
async function syncGist(dir='auto'){
  if(!DB.gistToken){showToast('Configura il token GitHub','warn');return;}
  setSyncState('ing');
  try{
    if(!DB.gistId){
      const list=await gFetch('https://api.github.com/gists');
      const f=list.find(g=>g.description==='Workout Tracker Data');
      if(f) DB.gistId=f.id;
    }
    if(DB.gistId&&dir!=='push'){
      const g=await gFetch(`https://api.github.com/gists/${DB.gistId}`);
      const rem=JSON.parse(g.files['data.json'].content);
      const myTs=new Set(DB.logs.map(l=>l.ts));
      DB.logs=[...DB.logs,...(rem.logs||[]).filter(l=>!myTs.has(l.ts))].sort((a,b)=>b.ts-a.ts).slice(0,500);
      if(rem.schedule&&Object.keys(rem.schedule).length) DB.schedule=rem.schedule;
      if(rem.rawText) DB.rawText=rem.rawText;
      if(rem.profile) DB.profile={...DB.profile,...rem.profile};
      if(rem.misure) DB.misure=rem.misure;
      if(rem.nutrition) DB.nutrition={...DB.nutrition,...rem.nutrition};
      if(rem.diary) DB.diary={...DB.diary,...rem.diary};
    }
    const payload={description:'Workout Tracker Data',public:false,files:{'data.json':{content:JSON.stringify({schedule:DB.schedule,logs:DB.logs,rawText:DB.rawText,profile:DB.profile,misure:DB.misure,nutrition:DB.nutrition,diary:DB.diary,lastSync:new Date().toISOString()})}}};
    if(DB.gistId) await gFetch(`https://api.github.com/gists/${DB.gistId}`,'PATCH',payload);
    else{const c=await gFetch('https://api.github.com/gists','POST',payload);DB.gistId=c.id;}
    DB.lastSync=new Date().toISOString();
    saveLocal();setSyncState('ok');showToast('Sincronizzato','ok');render();
  }catch(e){setSyncState('err');showToast('Errore sync: '+e.message,'err');}
}
async function gFetch(url,method='GET',body=null){
  const r=await fetch(url,{method,headers:{'Authorization':'token '+DB.gistToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},...(body?{body:JSON.stringify(body)}:{})});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function setSyncState(s){
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-label'),st=document.getElementById('sync-status');
  dot.className='sync-dot';
  if(s==='ok'){dot.classList.add('ok');lbl.textContent='Sync';st.textContent='Sincronizzato · '+(DB.lastSync?new Date(DB.lastSync).toLocaleString('it-IT',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):'');}
  else if(s==='ing'){dot.classList.add('ing');lbl.textContent='…';st.textContent='Sincronizzazione...';}
  else if(s==='err'){dot.classList.add('err');lbl.textContent='Errore';st.textContent='Errore · controlla il token';}
  else{lbl.textContent='Sync';st.textContent=DB.gistToken?'Non sincronizzato':'Dati locali · configura GitHub in Impostazioni';}
}
function showSyncModal(){if(!DB.gistToken){goTab('settings');return;}syncGist('auto');}

// ── TABS ──
function goTab(t){
  activeTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t)?.classList.add('active');
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts={};render();
}
function render(){
  const c=document.getElementById('content');
  if(activeTab==='gym') c.innerHTML=renderGym();
  else if(activeTab==='cali') c.innerHTML=renderCali();
  else if(activeTab==='outdoor') c.innerHTML=renderOutdoor();
  else if(activeTab==='coach') c.innerHTML=renderCoach();
  else if(activeTab==='profilo'){c.innerHTML=renderProfilo();setTimeout(drawProfiloCharts,80);}
  else if(activeTab==='progress'){c.innerHTML=renderProgress();setTimeout(drawCharts,80);}
  else if(activeTab==='history') c.innerHTML=renderHistory();
  else if(activeTab==='settings') c.innerHTML=renderSettings();
}

// ── GYM ──
function renderGym(){
  const days=Object.keys(DB.schedule);
  if(!days.length) return `<div class="empty"><div class="empty-ico">📄</div><h3>Nessuna scheda</h3><p>Vai in Impostazioni per caricare il PDF</p><button class="btn btn-primary mt-12" onclick="goTab('settings')">Impostazioni →</button></div>`;
  const day=days[activeDayIdx%days.length];
  const exs=DB.schedule[day]||[];
  const sess=sessionData['g_'+day]||{};
  const done=exs.filter((_,i)=>sess[i]?.done).length;
  const pct=exs.length?Math.round(done/exs.length*100):0;
  let html=`<div class="row-sb mb-8"><div><div style="font-size:11px;color:var(--muted)">${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}</div><div style="font-size:16px;font-weight:600;margin-top:1px">${esc(day)}</div></div><button class="btn btn-light btn-sm" onclick="openTimer('')">⏱ Timer</button></div>
  <div class="sgrid"><div class="sc"><div class="sc-num">${done}</div><div class="sc-lbl">Fatti</div></div><div class="sc"><div class="sc-num">${exs.length-done}</div><div class="sc-lbl">Rimasti</div></div><div class="sc"><div class="sc-num">${pct}%</div><div class="sc-lbl">Avanz.</div></div></div>
  <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="day-tabs">`;
  days.forEach((d,i)=>{html+=`<button class="dtab${i===activeDayIdx%days.length?' active':''}" onclick="activeDayIdx=${i};render()">${esc(d)}</button>`;});
  html+=`</div><div class="card">`;
  exs.forEach((ex,i)=>{
    const ed=sess[i]||{};
    html+=`<div class="ex-row"><div class="ex-check${ed.done?' done':''}" onclick="gymCheck('${esc(day)}',${i})">${ed.done?'✓':''}</div><div class="ex-info"><div class="ex-name">${esc(ex.name)}</div><div class="ex-det">${ex.sets}×${ex.reps}${ex.weight?' · '+ex.weight+'kg target':''}</div></div><div class="ex-inputs"><input class="ex-inp" type="number" placeholder="kg" min="0" step=".5" value="${ed.kg||''}" onchange="gymLog('${esc(day)}',${i},'kg',this.value)"><button class="btn btn-light btn-xs" onclick="openTimer('${esc(ex.name)}')" style="padding:5px 8px;font-size:12px">⏱</button></div></div>`;
  });
  html+=`</div>`;
  if(pct===100&&exs.length) html+=`<div class="card" style="text-align:center;border-color:var(--ok)"><div style="font-size:12px;font-weight:600;color:var(--ok)">✓ Completato</div></div>`;
  html+=`<button class="btn btn-primary btn-full mt-12" onclick="gymSave('${esc(day)}')">Salva sessione</button>`;
  return html;
}
function gymCheck(day,i){if(!sessionData['g_'+day])sessionData['g_'+day]={};sessionData['g_'+day][i]=sessionData['g_'+day][i]||{};sessionData['g_'+day][i].done=!sessionData['g_'+day][i].done;saveSess();render();}
function gymLog(day,i,f,v){if(!sessionData['g_'+day])sessionData['g_'+day]={};if(!sessionData['g_'+day][i])sessionData['g_'+day][i]={};sessionData['g_'+day][i][f]=parseFloat(v)||null;saveSess();}
function gymSave(day){
  const exs=DB.schedule[day]||[];const sess=sessionData['g_'+day]||{};
  const entries=exs.map((ex,i)=>({name:ex.name,sets:ex.sets,reps:ex.reps,targetKg:ex.weight,kg:sess[i]?.kg||null,done:!!(sess[i]?.done)}));
  const dc=entries.filter(e=>e.done).length;
  addLog({type:'gym',day,date:TODAY,ts:Date.now(),exercises:entries,done:dc,total:exs.length,pct:exs.length?Math.round(dc/exs.length*100):0});
  showToast('Sessione salvata','ok');
}

Note:${d.note||'nessuna'}`;

function renderProfilo(){

function renderDash(){
  const p=DB.profile;
  const lastM=DB.misure.length?DB.misure[DB.misure.length-1]:null;
  const prevM=DB.misure.length>1?DB.misure[DB.misure.length-2]:null;
  const firstM=DB.misure.length>1?DB.misure[0]:null;
  const peso=lastM?.peso||p.peso;
  const prevPeso=prevM?.peso;
  const grasso=lastM?.grassoCorporeo||p.grassoCorporeo;
  const bmi=peso&&p.altezza?+(peso/((p.altezza/100)**2)).toFixed(1):null;
  const streak=calcStreak();const last30=DB.logs.filter(l=>daysDiff(l.date)<=30).length;

  const arrow=(cur,prev,invertGood=false)=>{
    if(!cur||!prev) return '';
    const d=+(cur-prev).toFixed(1);if(d===0) return `<div class="pstat-sub">→ invariato</div>`;
    const g=invertGood?(d<0):(d>0);
    return `<div class="pstat-sub" style="color:${g?'var(--ok)':'var(--err)'}">${d>0?'↑':'↓'} ${Math.abs(d)}</div>`;
  };

  let html='';
  if(p.nome||p.obiettivo) html+=`<div style="margin-bottom:14px">${p.nome?`<div style="font-size:18px;font-weight:600">${esc(p.nome)}</div>`:''} ${p.obiettivo?`<div style="font-size:12px;color:var(--muted);margin-top:2px">🎯 ${esc(p.obiettivo)}</div>`:''}</div>`;

  html+=`<div class="sgrid4">
    <div class="pstat"><div class="pstat-val">${peso||'—'}</div><div class="pstat-lbl">Peso kg</div>${arrow(peso,prevPeso,false)}</div>
    <div class="pstat"><div class="pstat-val">${bmi||'—'}</div><div class="pstat-lbl">BMI</div><div class="pstat-sub">${bmi?bmiLabel(bmi):''}</div></div>
    <div class="pstat"><div class="pstat-val">${grasso?grasso+'%':'—'}</div><div class="pstat-lbl">Grasso</div>${arrow(grasso,prevM?.grassoCorporeo,true)}</div>
    <div class="pstat"><div class="pstat-val">${streak}</div><div class="pstat-lbl">Streak 🔥</div><div class="pstat-sub">${last30} / 30gg</div></div>
  </div>`;

  // Misure con barre
  if(lastM){
    const fields=[{k:'vita',l:'Vita',inv:true},{k:'fianchi',l:'Fianchi',inv:true},{k:'petto',l:'Petto',inv:false},{k:'braccioDx',l:'Braccio',inv:false},{k:'cosciaDx',l:'Coscia',inv:false},{k:'polpaccio',l:'Polpaccio',inv:false}].filter(f=>lastM[f.k]);
    if(fields.length){
      html+=`<div class="card"><div class="slabel">Misure corporee${lastM.date?' · '+lastM.date:''}</div>`;
      const maxV=Math.max(...fields.map(f=>parseFloat(lastM[f.k])||0));
      fields.forEach(f=>{
        const cur=parseFloat(lastM[f.k]);
        const first=firstM?parseFloat(firstM[f.k]):null;
        const diff=first?+(cur-first).toFixed(1):null;
        const isGood=diff===null?true:(f.inv?(diff<=0):(diff>=0));
        const col=diff===null||diff===0?'var(--acc)':isGood?'var(--ok)':'var(--err)';
        html+=`<div style="margin-bottom:10px"><div class="row-sb" style="margin-bottom:3px"><span style="font-size:12px;font-weight:500">${f.l}</span><span style="font-size:12px;font-weight:600">${cur} cm ${diff!==null&&diff!==0?`<span style="font-size:10px;color:${isGood?'var(--ok)':'var(--err)'}">${diff>0?'+':''}${diff}</span>`:''}</span></div><div class="mbar"><div class="mfill" style="width:${Math.min(100,cur/maxV*100)}%;background:${col}"></div></div></div>`;
      });
      html+=`</div>`;
    }
  }

  if(DB.misure.length>=2) html+=`<div class="card"><div class="slabel">Andamento peso</div><div class="chart-wrap"><canvas id="cPeso"></canvas></div></div>`;

  const recentLogs=DB.logs.slice(0,5);
  if(recentLogs.length){
    html+=`<div class="card"><div class="slabel">Attività recente</div>`;
    recentLogs.forEach(l=>{
      const ds=new Date(l.date).toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
      const icon=l.type==='gym'?'🏋️':l.type==='cali'?'🤸':l.type==='mtb'?'🚵':'🥾';

      html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:16px">${icon}</span><div style="flex:1;font-size:12px;font-weight:500">${info}</div><div style="font-size:11px;color:var(--muted)">${ds}</div></div>`;
    });

  }

  if(!p.nome&&!peso) html+=`<div class="card" style="border-style:dashed;text-align:center;padding:20px"><div style="font-size:13px;color:var(--muted);margin-bottom:10px">Compila il profilo per attivare la dashboard</div><button class="btn btn-primary btn-sm" onclick="profiloTab='anamnesi';render()">Compila profilo →</button></div>`;

}

async function handleNutriFile(f){
  if(!f) return;
  if(!DB.anthropicKey){showToast('Configura la Anthropic API Key','err');return;}
  const el=document.getElementById('nutri-drop-z');if(el)el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:12px">⏳ Analisi in corso...</div>';
  try{const b64=await f2b64(f);await analyzeNutritionAI(b64);}
  catch(e){showToast('Errore: '+e.message,'err');render();}
}
function handleNutriDrop(e){e.preventDefault();document.getElementById('nutri-drop-z').style.borderColor='var(--border)';const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')handleNutriFile(f);}
async function analyzeNutritionAI(b64){
  const sys=`Analizza questa scheda nutrizionale. Rispondi SOLO con JSON valido senza backtick:
{"rawText":"testo completo estratto","piano":"piano nutrizionale formattato chiaramente con pasti, calorie e macronutrienti se presenti"}`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Analizza.'}]}]})});
  const d=await r.json();if(!r.ok) throw new Error(d.error?.message||`HTTP ${r.status}`);
  const p=JSON.parse(d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
  DB.nutrition.rawText=p.rawText||'';DB.nutrition.piano=p.piano||'';
  saveLocal();showToast('Piano nutrizionale caricato','ok');render();
}

function renderHeatmap(){
  const today=new Date();today.setHours(0,0,0,0);const dow=['L','M','M','G','V','S','D'];
  let html=`<div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px;margin-right:3px">${dow.map(d=>`<div style="width:12px;height:12px;font-size:8px;color:var(--muted);display:flex;align-items:center;justify-content:center">${d}</div>`).join('')}</div>`;
  for(let w=7;w>=0;w--){
    html+=`<div style="display:flex;flex-direction:column;gap:3px">`;
    for(let d=0;d<7;d++){
      const dt=new Date(today);dt.setDate(today.getDate()-(w*7+(6-d)));
      const ds=dt.toISOString().split('T')[0];
      const count=DB.logs.filter(l=>l.date===ds).length;
      const a=count===0?'var(--border)':count===1?'rgba(0,0,0,.2)':count===2?'rgba(0,0,0,.5)':'var(--acc)';
      const border=ds===TODAY?'outline:2px solid var(--acc);outline-offset:1px':'';
      html+=`<div style="width:12px;height:12px;border-radius:2px;background:${a};${border}" title="${ds}: ${count}"></div>`;
    }
    html+='</div>';
  }
  return html+'</div></div>';
}

    }else if(log.type==='cali'){
      const avgR=log.exercises?.filter(e=>e.rpe).length?Math.round(log.exercises.filter(e=>e.rpe).reduce((a,e)=>a+e.rpe,0)/log.exercises.filter(e=>e.rpe).length*10)/10:null;
      html+=`<div class="card cat-cali" style="padding:12px"><div class="log-top"><div class="log-title">Calisthenics</div><div class="row"><span class="badge badge-def">${ds}</span><button class="btn btn-danger btn-xs" onclick="delLog(${li})">✕</button></div></div><div class="log-meta">${log.exercises?.length||0} esercizi${avgR?' · RPE '+avgR:''}</div><div class="log-tags">${(log.exercises||[]).map(e=>`<span class="badge badge-def">${esc(e.name)}${e.reps?' '+esc(e.reps):''}${e.rpe?' RPE'+e.rpe:''}</span>`).join('')}</div>${log.notes?`<div style="font-size:11px;color:var(--muted);margin-top:5px">${esc(log.notes)}</div>`:''}</div>`;
    }else if(log.type==='mtb'||log.type==='trek'){
      html+=`<div class="card ${log.type==='mtb'?'cat-mtb':'cat-trek'}" style="padding:12px"><div class="log-top"><div class="log-title">${log.type==='mtb'?'Mountain Bike':'Trekking'}</div><div class="row"><span class="badge badge-def">${ds}</span><button class="btn btn-danger btn-xs" onclick="delLog(${li})">✕</button></div></div><div class="log-tags" style="margin-top:5px">${log.duration?`<span class="badge badge-def">⏱ ${log.duration}</span>`:''}${log.distance?`<span class="badge badge-def">${log.distance} km</span>`:''}${log.elevation?`<span class="badge badge-def">⛰ ${log.elevation}m</span>`:''}${log.weather?`<span class="badge badge-def">${log.weather}</span>`:''}</div>${log.notes?`<div style="font-size:11px;color:var(--muted);margin-top:5px">${esc(log.notes)}</div>`:''}${log.link?`<a href="${esc(log.link)}" target="_blank" style="font-size:11px;color:var(--muted);display:block;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">↗ ${esc(log.link)}</a>`:''}</div>`;
    }
  });
  return html;
}
function delLog(i){const f=window._hf||'all';const filtered=f==='all'?DB.logs:DB.logs.filter(l=>l.type===f||(f==='outdoor'&&(l.type==='mtb'||l.type==='trek')));const target=filtered[i];const ri=DB.logs.indexOf(target);if(ri>=0){DB.logs.splice(ri,1);saveLocal();render();}}

// ── SETTINGS ──
function renderSettings(){
  return `<div class="card"><div class="slabel">GitHub Gist — Sincronizzazione</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">I dati vengono salvati in un Gist privato sul tuo account GitHub. Funziona da qualsiasi dispositivo.</p>
    <details style="margin-bottom:12px"><summary>Come creare il token</summary><div style="padding:8px 0;font-size:12px;color:var(--muted);line-height:1.8">1. <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--text)">github.com/settings/tokens</a><br>2. Generate new token (classic)<br>3. Seleziona solo <strong>gist</strong><br>4. Copia e incolla qui sotto</div></details>
    <label>Personal Access Token</label>
    <input type="password" id="gh-tok" placeholder="ghp_..." value="${DB.gistToken||''}" autocomplete="off" style="margin-bottom:8px">
    ${DB.gistId?`<div style="font-size:10px;color:var(--ok);margin-bottom:8px">✓ Gist: ${DB.gistId.slice(0,14)}…</div>`:''}
    <div class="row"><button class="btn btn-primary btn-sm" onclick="saveToken()">Salva</button>${DB.gistToken?`<button class="btn btn-ghost btn-sm" onclick="syncGist('auto')">Sincronizza ora</button>`:''}</div>
  </div>
  <div class="card"><div class="slabel">Anthropic API Key — PDF & Coach AI</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">Necessaria per analizzare i PDF e per il Coach AI.<br>Ottienila su <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--text)">console.anthropic.com</a></p>
    <label>API Key</label>
    <input type="password" id="ant-key" placeholder="sk-ant-..." value="${DB.anthropicKey||''}" autocomplete="off" style="margin-bottom:8px">
    ${DB.anthropicKey?`<div style="font-size:10px;color:var(--ok);margin-bottom:8px">✓ Key configurata</div>`:`<div style="font-size:10px;color:var(--warn);margin-bottom:8px">⚠ Key non configurata</div>`}
    <button class="btn btn-primary btn-sm" onclick="saveAnthropicKey()">Salva</button>
  </div>
  <div class="card"><div class="slabel">Scheda palestra</div>
    <div onclick="document.getElementById('pdf-in').click()" id="drop-z" ondragover="event.preventDefault();this.style.borderColor='var(--acc)'" ondragleave="this.style.borderColor='var(--border)'" ondrop="handleDrop(event)" style="border:1px dashed var(--border);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s">
      <div style="font-size:13px;font-weight:500">${Object.keys(DB.schedule).length?'Ricarica PDF':'Carica PDF scheda'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">Clicca o trascina</div>
      ${!DB.anthropicKey?'<div style="font-size:10px;color:var(--err);margin-top:6px">⚠ Configura prima la Anthropic API Key</div>':''}
    </div>
    <input type="file" id="pdf-in" accept="application/pdf" onchange="handleFile(this.files[0])">
    ${Object.keys(DB.schedule).length?`<div style="font-size:11px;color:var(--ok);margin-top:8px">✓ ${Object.keys(DB.schedule).length} giorni · ${Object.values(DB.schedule).flat().length} esercizi</div><details style="margin-top:6px"><summary>Anteprima</summary><div style="padding:8px 0">${Object.entries(DB.schedule).map(([d,exs])=>`<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;margin-bottom:3px">${esc(d)}</div>${exs.map(e=>`<div style="font-size:11px;color:var(--muted);padding:1px 0 1px 8px;border-left:1px solid var(--border)">${esc(e.name)} — ${e.sets}×${e.reps}${e.weight?' @ '+e.weight+'kg':''}</div>`).join('')}</div>`).join('')}</div></details><button class="btn btn-danger btn-xs mt-8" onclick="if(confirm('Rimuovere?')){DB.schedule={};DB.rawText='';saveLocal();render()}">Rimuovi scheda</button>`:''}
  </div>
  <div class="card"><div class="slabel">Dati</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${DB.logs.length} sessioni · ${DB.misure.length} misure · ultima sync: ${DB.lastSync?new Date(DB.lastSync).toLocaleString('it-IT'):'mai'}</div>
    <div class="row"><button class="btn btn-light btn-sm" onclick="exportJSON()">Esporta JSON</button><button class="btn btn-danger btn-sm" onclick="if(confirm('Reset completo? Tutti i dati verranno persi.')){localStorage.removeItem('wt_v1');location.reload()}">Reset</button></div>
  </div>`;
}
function saveToken(){const t=document.getElementById('gh-tok').value.trim();DB.gistToken=t;saveLocal();if(t){syncGist('auto');showToast('Token salvato','ok');}else{setSyncState('off');showToast('Token rimosso','warn');}}
function saveAnthropicKey(){const k=document.getElementById('ant-key').value.trim();DB.anthropicKey=k;saveLocal();showToast(k?'API Key salvata':'API Key rimossa',k?'ok':'warn');render();}
function exportJSON(){const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='workout_'+TODAY+'.json';a.click();}

// ── PDF ──
async function handleFile(f){
  if(!f)return;
  if(!DB.anthropicKey){showToast('Configura la Anthropic API Key','err');goTab('settings');return;}
  document.getElementById('content').innerHTML=`<div class="empty"><div style="width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px"></div><p style="color:var(--muted);font-size:12px">Analisi scheda in corso…</p></div>`;
  try{const b64=await f2b64(f);await analyzeAI(b64);}catch(e){showToast('Errore: '+e.message,'err');render();}
}
function handleDrop(e){e.preventDefault();document.getElementById('drop-z').style.borderColor='var(--border)';const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')handleFile(f);}
function f2b64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Lettura fallita'));r.readAsDataURL(f);});}
async function analyzeAI(b64){
  const sys=`Analizza la scheda di allenamento. Rispondi SOLO con JSON valido, senza backtick.
{"rawText":"testo estratto","schedule":{"Nome Giorno":[{"name":"","sets":0,"reps":"","weight":null,"notes":""}]}}
Se non ci sono giorni usa "Giorno 1" ecc. weight=null se non specificato.`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,system:sys,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Analizza.'}]}]})});
  const d=await r.json();if(!r.ok) throw new Error(d.error?.message||`HTTP ${r.status}`);
  const p=JSON.parse(d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
  DB.rawText=p.rawText||'';DB.schedule=p.schedule||{};saveLocal();if(DB.gistToken)syncGist('push');
  showToast(`Scheda caricata: ${Object.keys(DB.schedule).length} giorni`,'ok');render();
}

// ── TIMER ──
function openTimer(name){document.getElementById('timer-overlay').style.display='flex';document.getElementById('timer-lbl').textContent=name?`Recupero — ${name}`:'Timer';timerLeft=timerTotal;timerRunning=false;clearInterval(timerInterval);document.getElementById('timer-btn').textContent='Start';updateTimerUI();}
function closeTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-overlay').style.display='none';}
function setTimer(s){clearInterval(timerInterval);timerRunning=false;timerTotal=s;timerLeft=s;document.querySelectorAll('.t-pre').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('timer-btn').textContent='Start';updateTimerUI();}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-btn').textContent='Riprendi';}
  else{if(timerLeft<=0)timerLeft=timerTotal;timerRunning=true;document.getElementById('timer-btn').textContent='Pausa';timerInterval=setInterval(()=>{timerLeft--;updateTimerUI();if(timerLeft<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-btn').textContent='Ricomincia';if(navigator.vibrate)navigator.vibrate([300,100,300]);}},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerLeft=timerTotal;document.getElementById('timer-btn').textContent='Start';updateTimerUI();}
function updateTimerUI(){const m=Math.floor(timerLeft/60),s=timerLeft%60;const d=document.getElementById('timer-disp');d.textContent=`${m}:${String(s).padStart(2,'0')}`;d.className='timer-display'+(timerLeft<=10?' done':timerLeft<=30?' warn':'');document.getElementById('timer-bar-fill').style.width=Math.max(0,timerLeft/timerTotal*100)+'%';}

// ── UTILS ──
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function daysDiff(d){return Math.floor((Date.now()-new Date(d).getTime())/(864e5));}
function calcStreak(){const dates=[...new Set(DB.logs.map(l=>l.date))].sort().reverse();if(!dates.length)return 0;let s=0,cur=new Date(TODAY);for(const d of dates){const dd=new Date(d);if(Math.round((cur-dd)/864e5)<=1){s++;cur=dd;}else break;}return s;}
function showToast(msg,type='ok'){const el=document.createElement('div');const c={ok:'var(--ok)',warn:'var(--warn)',err:'var(--err)'};el.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:8px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;z-index:200;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.12);border-left:3px solid ${c[type]||'var(--acc)'}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}

// ── INIT ──
loadLocal();setSyncState('off');render();if(DB.gistToken)syncGist('auto');
</script>
