function getSugg(base,search,max){var freq=getFreq();var combined=base.slice();Object.keys(freq).forEach(function(n){if(combined.indexOf(n)<0)combined.push(n);});var filtered=search?combined.filter(function(n){return n.toLowerCase().indexOf(search.toLowerCase())>=0;}):combined;filtered.sort(function(a,b){return (freq[b]||0)-(freq[a]||0);});return filtered.slice(0,max||10);}

async function findGist(token){
  var res=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':'Bearer '+token}});
  var list=await res.json();
  return Array.isArray(list)?list.find(function(g){return g.description==='GymTracker Data'&&g.files&&g.files['gymtracker.json'];}):null;
}

async function loadFromGist(token){
  var gistId=getGistId();
  if(!gistId){
    var found=await findGist(token);
    if(!found)return null;
    saveGistId(found.id); gistId=found.id;
  }
  var res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Authorization':'Bearer '+token}});
  var data=await res.json();
  var raw=data.files&&data.files['gymtracker.json']&&data.files['gymtracker.json'].content;
  return raw?JSON.parse(raw):null;
}

async function syncToGist(data,token){
  var content=JSON.stringify(data);
  var gistId=getGistId();
  if(!gistId){
    var found=await findGist(token);
    if(found){gistId=found.id;saveGistId(gistId);}
    else{
      var res=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({description:'GymTracker Data',public:false,files:{'gymtracker.json':{content:content}}})});
      var gist=await res.json();
      if(gist.id){saveGistId(gist.id);}
      return;
    }
  }
  await fetch('https://api.github.com/gists/'+gistId,{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({files:{'gymtracker.json':{content:content}}})});
}

function fmtEsCard(ex){var t=ex.tipo||'standard';if(t==='riscaldamento')return (ex.durata||10)+'min · '+(ex.intensita||'Media');if(t==='progressivo')return 'Progressivo · '+(ex.progressione?ex.progressione.length:0)+' sett. · '+(ex.peso||0)+'kg';if(t==='superset')return (ex.sets||ex.serie||3)+'×'+(ex.reps||'?')+'+'+((ex.partner&&ex.partner.reps)||'?')+' · '+fmtRec(ex.recSet||ex.rec||90)+' fra set';return (ex.sets||ex.serie||3)+'×'+(ex.reps||'?')+' · '+(ex.peso||0)+'kg · '+fmtRec(ex.recSet||ex.rec||90)+' fra set';}

function rm1(p,r){return r<=1?p:Math.round(p*(1+r/30));}
function parseReps(r){var s=String(r);return s.indexOf('-')>=0?parseInt(s,10):(parseInt(s,10)||10);}
function estimateTime(bl){var m=10;bl.es.forEach(function(ex){if(ex.tipo==='riscaldamento'){m+=(ex.durata||10)+1;}else{var s=typeof ex.serie==='number'?ex.serie:(ex.sets||3);var r=ex.rec||ex.recSet||90;m+=s*(0.75+r/60)+1;}});return Math.ceil(m/5)*5;}
/* ── gemini retry helper ── */
function fetchGeminiWithRetry(url,options,retries){
  if(retries===undefined)retries=3;
  return fetch(url,options).then(function(resp){return resp.json();}).then(function(result){
    if(result.error){
      var msg=result.error.message||'';
      var retryable=msg.indexOf('high demand')>=0||msg.indexOf('overloaded')>=0||msg.indexOf('RESOURCE_EXHAUSTED')>=0||result.error.code===429||result.error.code===503;
      if(retryable&&retries>0){
        return new Promise(function(resolve,reject){
          setTimeout(function(){fetchGeminiWithRetry(url,options,retries-1).then(resolve).catch(reject);},3500);
        });
      }
      throw new Error(msg||'Gemini error');
    }
    return result;
  });
}

function b64ToBlob(b64){
  var binary=atob(b64);var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++){bytes[i]=binary.charCodeAt(i);}
  return new Blob([bytes],{type:'application/pdf'});
}

          })
        ),
        msgs.length>0&&h('div',{style:{maxHeight:340,overflowY:'auto',marginBottom:10,display:'flex',flexDirection:'column',gap:8}},
          msgs.map(function(msg,i){
            var isUser=msg.role==='user';
            return h('div',{key:i,style:{alignSelf:isUser?'flex-end':'flex-start',maxWidth:'90%',background:isUser?ACC2:SURF2,border:'0.5px solid '+(isUser?ACC3:BORD),borderRadius:isUser?'14px 14px 4px 14px':'14px 14px 14px 4px',padding:'10px 13px'}},
              h('div',{style:{fontSize:13,lineHeight:1.65,color:isUser?ACC:TEXT,whiteSpace:'pre-wrap'}},msg.content)
            );
          }),
          loading&&h('div',{style:{alignSelf:'flex-start',background:SURF2,border:'0.5px solid '+BORD,borderRadius:'14px 14px 14px 4px',padding:'10px 13px'}},
            h('div',{style:{display:'flex',gap:4,alignItems:'center'}},
              [0,1,2].map(function(i){return h('div',{key:i,style:{width:5,height:5,borderRadius:'50%',background:MUTED,opacity:0.6}});})
            )
          ),
          h('div',{ref:chatEndRef})
        ),
        h('div',{style:{display:'flex',gap:8}},
          h('input',{type:'text',value:chatInp,onChange:function(e){setChatInp(e.target.value);},onKeyDown:function(e){if(e.key==='Enter'&&!e.shiftKey)sendChat();},placeholder:'Chiedi qualcosa…',style:{flex:1,background:SURF2,border:'1px solid '+BORD,borderRadius:10,padding:'11px 14px',color:TEXT,fontSize:14}}),
          h('button',{onClick:sendChat,disabled:loading||!chatInp.trim(),style:{padding:'11px 18px',borderRadius:10,border:'none',background:ACC,color:ACT,fontWeight:700,fontSize:13,cursor:'pointer',flexShrink:0,opacity:loading||!chatInp.trim()?0.5:1}},'→')
        )
      ),
      /* ─ All reports list ─ */
      reports.length>0&&h('div',null,
        h(Lbl,null,'Report caricati ('+reports.length+')'),
        reports.map(function(rep){
          var tc=TYPE_COLOR[rep.type]||ACC;
          return h(Card,{key:rep.id},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:12,fontWeight:500,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},rep.filename),
                h('div',{style:{fontSize:11,color:MUTED}},rep.reportDate)
              ),
              h('div',{style:{display:'flex',gap:6,alignItems:'center',flexShrink:0,marginLeft:8}},
                h('span',{style:{fontSize:9,color:tc,background:tc+'18',padding:'2px 8px',borderRadius:20,border:'1px solid '+tc+'44',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em'}},TYPE_LABEL[rep.type]||rep.type),
                rep.hasPdf&&h('button',{onClick:function(){var b64=loadPdfLocal(rep.id);if(!b64){alert('PDF non trovato — potrebbe essere stato rimosso dalla memoria del dispositivo.');return;}var blob=b64ToBlob(b64);var url=URL.createObjectURL(blob);setViewingPdf(url);},style:{background:ACC5,border:'1px solid '+ACC3,borderRadius:8,padding:'4px 8px',cursor:'pointer',fontSize:10,color:ACC,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}},'📄 PDF'),
                h('button',{onClick:function(){if(confirm('Eliminare questo report?')){deletePdfLocal(rep.id);persist({reports:(data.reports||[]).filter(function(x){return x.id!==rep.id;})});}},style:{background:'none',border:'none',cursor:'pointer',padding:4}},h(Icon,{n:'trash',sz:14,c:'#EF4444'}))
              )
            )
          );
        })
      )
    )
  );
}

/* ── app ── */
function App(){
  var stored=stLoad();
  var _a1=useState(stored&&stored.schede||[]);var schede=_a1[0];var setSchede=_a1[1];
  var _a2=useState(stored&&stored.sessions||[]);var sessions=_a2[0];var setSessions=_a2[1];
  var _a3=useState('home');var view=_a3[0];var setView=_a3[1];
  var _a4=useState({});var vp=_a4[0];var setVp=_a4[1];
  var _a5=useState(loadProfile());var profile=_a5[0];var setProfile=_a5[1];
  var _a6=useState(!loadProfile());var showSetup=_a6[0];var setShowSetup=_a6[1];
  var _a7=useState('idle');var syncStatus=_a7[0];var setSyncStatus=_a7[1];
  var syncTimerRef=useRef(null);
  var initialDone=useRef(false);

  useEffect(function(){var t=loadTheme();applyTheme(t);},[]);

  useEffect(function(){
    var token=getToken();
    if(!token){initialDone.current=true;setSyncStatus('idle');return;}
    setSyncStatus('loading');
    loadFromGist(token).then(function(data){
      if(data){
        if(data.schede)setSchede(data.schede);
        if(data.sessions)setSessions(data.sessions);
        if(data.profile){setProfile(data.profile);saveProfile(data.profile);setShowSetup(false);}
        if(data.freq){try{localStorage.setItem(FK,JSON.stringify(data.freq));}catch(e){}}
      }
      setSyncStatus('ok');
      initialDone.current=true;
    }).catch(function(){
      setSyncStatus('error');
      initialDone.current=true;
    });
  },[]);

  useEffect(function(){
    if(!initialDone.current)return;
    var freq=getFreq();
    var pr=profile;
    var data={schede:schede,sessions:sessions,profile:pr,freq:freq};
    stSave({schede:schede,sessions:sessions});
    var token=getToken();
    if(!token){return;}
    setSyncStatus('syncing');
    clearTimeout(syncTimerRef.current);
    syncTimerRef.current=setTimeout(function(){
      syncToGist(data,token).then(function(){setSyncStatus('ok');}).catch(function(){setSyncStatus('error');});
    },2000);
  },[schede,sessions,profile]);

  function go(v,pp){setView(v);setVp(pp||{});if(window.scrollTo)window.scrollTo(0,0);}
  function setSch(arr){setSchede(arr);}

  if(showSetup){
    return h(ProfileSetup,{onDone:function(pr){setProfile(pr);setShowSetup(false);}});
  }

  var isLive=view==='live'||view==='callive';

  function renderView(){
    switch(view){
      case 'home':       return h(Home,{schede:schede,sessions:sessions,profile:profile,syncStatus:syncStatus,go:go});
      case 'start':      return h(Start,{schede:schede,go:go});
      case 'pesiblocks': return h(PesiBlocks,{schede:schede,sessions:sessions,go:go});
      case 'live':       return h(PesiLive,{bl:vp.bl,sId:vp.sId,sessions:sessions,onDone:function(s){setSessions(function(prev){return prev.concat([s]);});go('log');},go:go});
      case 'callive':    return h(CalLive,{onDone:function(s){setSessions(function(prev){return prev.concat([s]);});go('log');},go:go});
      case 'log':        return h(Log,{sessions:sessions,setSessions:setSessions,schede:schede,go:go});
      case 'det':        return h(Det,{s:vp.s,setSessions:setSessions,go:go});
      case 'stats':      return h(Stats,{sessions:sessions,schede:schede,go:go});
      case 'eser':       return h(EsDetail,{ex:vp.ex,tipo:vp.tipo,sessions:sessions,go:go});
      case 'scheda':     return h(SchedaV,{schede:schede,setSch:setSch,go:go});
      case 'nuova':      return h(NuovaScheda,{initialScheda:vp.initialScheda||null,onSave:function(s){if(vp.initialScheda){setSchede(function(prev){return prev.map(function(x){return x.id===s.id?s:x;});});}else{setSchede(function(prev){return prev.map(function(x){return Object.assign({},x,{attiva:false});}).concat([s]);});}go('scheda');},go:go});
      case 'settings':   return h(Settings,{profile:profile,onProfile:function(pr){setProfile(pr);},go:go});
      case 'corpo':      return h(CorpoNutri,{sessions:sessions,go:go});
      default:           return h(Home,{schede:schede,sessions:sessions,profile:profile,go:go});
    }
  }

  return h('div',{style:{minHeight:'100vh',background:BG,color:TEXT,maxWidth:440,margin:'0 auto',position:'relative',paddingBottom:isLive?0:80}},
    renderView(),
    !isLive&&h(Nav,{cur:view,go:go})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
