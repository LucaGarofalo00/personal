function saveGistId(id){try{localStorage.setItem(GID_KEY,id);}catch(e){}}

async function findGist(token){
  var res=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':'Bearer '+token}});
  var list=await res.json();
  return Array.isArray(list)?list.find(function(g){return g.description==='GymTracker Data'&&g.files&&g.files['gymtracker.json'];}):null;
}

async function loadFromGist(token){
  var gistId=getGistId();
  if(!gistId){
    var found=await findGist(token);
    if(!found)return null;
    saveGistId(found.id); gistId=found.id;
  }
  var res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Authorization':'Bearer '+token}});
  var data=await res.json();
  var raw=data.files&&data.files['gymtracker.json']&&data.files['gymtracker.json'].content;
  return raw?JSON.parse(raw):null;
}

async function syncToGist(data,token){
  var content=JSON.stringify(data);
  var gistId=getGistId();
  if(!gistId){
    var found=await findGist(token);
    if(found){gistId=found.id;saveGistId(gistId);}
    else{
      var res=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({description:'GymTracker Data',public:false,files:{'gymtracker.json':{content:content}}})});
      var gist=await res.json();
      if(gist.id){saveGistId(gist.id);}
      return;
    }
  }
  await fetch('https://api.github.com/gists/'+gistId,{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({files:{'gymtracker.json':{content:content}}})});
}

function rm1(p,r){return r<=1?p:Math.round(p*(1+r/30));}
function parseReps(r){var s=String(r);return s.indexOf('-')>=0?parseInt(s,10):(parseInt(s,10)||10);}
function estimateTime(bl){var m=10;bl.es.forEach(function(ex){m+=ex.serie*(0.75+ex.rec/60)+1;});return Math.ceil(m/5)*5;}

/* ── chart svg ── */
function Chart(p){
  var data=p.data,dataKey=p.dataKey;

  var vals=data.map(function(d){return d[dataKey];});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var range=maxV-minV||1;
  var W=320,H=140,pl=40,pr=8,pt=8,pb=26,iW=W-pl-pr,iH=H-pt-pb,n=data.length;
  function cx(i){return pl+(n>1?(i/(n-1))*iW:iW/2);}
  function cy(v){return pt+iH-((v-minV)/range)*iH;}
  var pts=data.map(function(d,i){return cx(i).toFixed(1)+','+cy(d[dataKey]).toFixed(1);}).join(' ');
  var step=Math.max(1,Math.ceil(n/4));
  return h('svg',{width:'100%',viewBox:'0 0 '+W+' '+H,style:{overflow:'visible'}},
    h('line',{key:'g1',x1:pl,y1:cy(minV).toFixed(1),x2:W-pr,y2:cy(minV).toFixed(1),stroke:BORD,strokeWidth:'0.5'}),
    h('line',{key:'g2',x1:pl,y1:cy(maxV).toFixed(1),x2:W-pr,y2:cy(maxV).toFixed(1),stroke:BORD,strokeWidth:'0.5'}),
    h('text',{key:'t1',x:pl-4,y:cy(minV)+4,textAnchor:'end',fill:MUTED,fontSize:9},minV),
    h('text',{key:'t2',x:pl-4,y:cy(maxV)+4,textAnchor:'end',fill:MUTED,fontSize:9},maxV),
    data.map(function(d,i){return(i%step===0||i===n-1)?h('text',{key:'x'+i,x:cx(i).toFixed(1),y:H-4,textAnchor:'middle',fill:MUTED,fontSize:9},d.data):null;}),
    h('polyline',{key:'pl',points:pts,fill:'none',stroke:ACC,strokeWidth:'2',strokeLinejoin:'round'}),
    data.map(function(d,i){return h('circle',{key:'c'+i,cx:cx(i).toFixed(1),cy:cy(d[dataKey]).toFixed(1),r:'3',fill:ACC});})
  );
}

      h('div',{style:{color:MUTED,marginBottom:20,lineHeight:1.7}},'Inserisci gli esercizi che\nti ha dato il tuo PT'),
      h(Btn,{onClick:function(){go('nuova');}},'Crea scheda')
    ),
    schede.map(function(s,idx){
      return h(Card,{key:s.id,style:s.attiva?{border:'1px solid '+ACC3}:{}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          h('div',null,
            h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:'0.02em',marginBottom:4}},s.nome),
            h('div',{style:{fontSize:11,color:MUTED}},s.blocchi.length+' giorni · '+s.blocchi.reduce(function(t,b){return t+b.es.length;},0)+' esercizi'),
            h('div',{style:{fontSize:10,color:MUTED,marginTop:2}},fmtD(s.data))
          ),
          h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}},
            s.attiva&&h('span',{style:{fontSize:10,background:ACC5,color:ACC,padding:'3px 8px',borderRadius:20,border:'1px solid '+ACC3,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}},'Attiva'),
            !s.attiva&&h('button',{onClick:function(){setSch(schede.map(function(x,i){return Object.assign({},x,{attiva:i===idx});}));},style:{background:'none',border:'0.5px solid '+BORD,borderRadius:8,padding:'4px 10px',color:MUTED,fontSize:11,cursor:'pointer'}},'Imposta attiva'),
            h('button',{onClick:function(e){e.stopPropagation();if(confirm('Eliminare la scheda "'+s.nome+'"?')){setSch(schede.filter(function(_,i){return i!==idx;}));}},style:{background:'none',border:'none',padding:4,cursor:'pointer',marginTop:2}},h(Icon,{n:'trash',sz:16,c:'#EF4444'}))
          )
        )
      );
    })
  );
}

/* ── nuova scheda ── */
function NuovaScheda(p){
  var onSave=p.onSave,go=p.go;
  var _s1=useState(0);var step=_s1[0];var setStep=_s1[1];
  var _s2=useState('');var nome=_s2[0];var setNome=_s2[1];
  var _s3=useState([{id:uid(),nome:'Giorno A',es:[]}]);var blocchi=_s3[0];var setBlocchi=_s3[1];
  var _s4=useState(0);var ab=_s4[0];var setAb=_s4[1];
  var _s5=useState(false);var picker=_s5[0];var setPicker=_s5[1];
  var iBase={width:'100%',background:SURF2,border:'1px solid '+BORD,borderRadius:10,padding:'11px 12px',color:TEXT,fontSize:14};
  function addEs(esNome){
    setBlocchi(function(prev){return prev.map(function(b,i){if(i!==ab)return b;var ne={id:uid(),nome:esNome,gr:'',peso:0,serie:3,reps:'10',rec:90,note:''};return Object.assign({},b,{es:b.es.concat([ne])});});});
  }
  if(step===0)return h('div',{style:{padding:'24px 16px'}},
    h(Back,{onClick:function(){go('scheda');}}),
    h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:32,letterSpacing:'0.03em',margin:'14px 0 18px'}},'Nuova scheda'),
    h(Lbl,null,'Nome della scheda'),
    h('input',{value:nome,onChange:function(e){setNome(e.target.value);},placeholder:'es. Scheda ipertrofia – Mag 2025',style:Object.assign({},iBase,{marginBottom:16})}),
    h(Btn,{full:true,onClick:function(){if(nome.trim())setStep(1);}},'Continua →')
  );
  return h('div',{style:{padding:'24px 16px'}},
    h(ExercisePicker,{visible:picker,onClose:function(){setPicker(false);},onAdd:function(n){addEs(n);},baseList:PESI_ES,label:'Aggiungi esercizio'}),
    h(Back,{onClick:function(){setStep(0);}}),
    h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:'0.02em',margin:'12px 0 14px'}},nome),
    h('div',{style:{display:'flex',gap:6,marginBottom:14,overflowX:'auto'}},
      blocchi.map(function(b,i){return h('div',{key:b.id,style:{flexShrink:0,display:'flex',alignItems:'center',gap:3}},h('button',{onClick:function(){setAb(i);},style:{padding:'5px 12px',borderRadius:20,border:'1px solid '+(ab===i?ACC:BORD),background:ab===i?ACC2:'transparent',color:ab===i?ACC:MUTED,fontSize:12,cursor:'pointer',whiteSpace:'nowrap'}},b.nome),blocchi.length>1&&h('button',{onClick:function(){if(confirm('Eliminare "'+b.nome+'"?')){setBlocchi(function(prev){var next=prev.filter(function(_,ii){return ii!==i;});return next;});setAb(function(cur){return cur>=blocchi.length-1?blocchi.length-2:cur;});}},style:{background:'none',border:'none',cursor:'pointer',padding:'2px 3px',lineHeight:1}},h(Icon,{n:'close',sz:12,c:'#EF4444'})));}),
      h('button',{onClick:function(){var nb={id:uid(),nome:'Giorno '+String.fromCharCode(65+blocchi.length),es:[]};setBlocchi(function(prev){return prev.concat([nb]);});setAb(blocchi.length);},style:{flexShrink:0,padding:'5px 12px',borderRadius:20,border:'1px dashed '+BORD,background:'transparent',color:MUTED,fontSize:12,cursor:'pointer'}},'+ giorno')
    ),
    blocchi[ab].es.map(function(ex,i){
      return h('div',{key:i,style:{background:SURF2,borderRadius:8,padding:'9px 12px',marginBottom:6,fontSize:12,display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',null,
          h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:16,letterSpacing:'0.02em'}},ex.nome),
          h('div',{style:{color:MUTED}},ex.serie+'×'+ex.reps+' · rec '+ex.rec+'s')
        ),
        h('button',{onClick:function(){setBlocchi(function(prev){return prev.map(function(b,bi){if(bi!==ab)return b;return Object.assign({},b,{es:b.es.filter(function(_,ei){return ei!==i;})});});});},style:{background:'none',border:'none',cursor:'pointer',padding:4}},h(Icon,{n:'trash',sz:15,c:'#EF4444'}))
      );
    }),
    h('button',{onClick:function(){setPicker(true);},style:{width:'100%',padding:'12px',borderRadius:10,border:'1px dashed '+ACC3,background:ACC5,color:ACC,fontSize:14,cursor:'pointer',fontWeight:600,marginBottom:16}},'+ Aggiungi esercizio'),
    h(Btn,{full:true,onClick:function(){onSave({id:uid(),nome:nome,attiva:true,data:new Date().toISOString(),blocchi:blocchi});}},'Salva scheda')
  );
}

/* ── app ── */
function App(){
  var stored=stLoad();
  var _a1=useState(stored&&stored.schede||[]);var schede=_a1[0];var setSchede=_a1[1];
  var _a2=useState(stored&&stored.sessions||[]);var sessions=_a2[0];var setSessions=_a2[1];
  var _a3=useState('home');var view=_a3[0];var setView=_a3[1];
  var _a4=useState({});var vp=_a4[0];var setVp=_a4[1];
  var _a5=useState(loadProfile());var profile=_a5[0];var setProfile=_a5[1];
  var _a6=useState(!loadProfile());var showSetup=_a6[0];var setShowSetup=_a6[1];
  var _a7=useState('idle');var syncStatus=_a7[0];var setSyncStatus=_a7[1];
  var syncTimerRef=useRef(null);
  var initialDone=useRef(false);

  useEffect(function(){var t=loadTheme();applyTheme(t);},[]);

  useEffect(function(){
    var token=getToken();
    if(!token){initialDone.current=true;setSyncStatus('idle');return;}
    setSyncStatus('loading');
    loadFromGist(token).then(function(data){
      if(data){
        if(data.schede)setSchede(data.schede);
        if(data.sessions)setSessions(data.sessions);
      }
      setSyncStatus('ok');
      initialDone.current=true;
    }).catch(function(){
      setSyncStatus('error');
      initialDone.current=true;
    });
  },[]);

  useEffect(function(){
    if(!initialDone.current)return;
    var data={schede:schede,sessions:sessions};
    stSave(data);
    var token=getToken();
    if(!token){return;}
    setSyncStatus('syncing');
    clearTimeout(syncTimerRef.current);
    syncTimerRef.current=setTimeout(function(){
      syncToGist(data,token).then(function(){setSyncStatus('ok');}).catch(function(){setSyncStatus('error');});
    },2000);
  },[schede,sessions]);

  function go(v,pp){setView(v);setVp(pp||{});if(window.scrollTo)window.scrollTo(0,0);}
  function setSch(arr){setSchede(arr);}

  if(showSetup){
    return h(ProfileSetup,{onDone:function(pr){setProfile(pr);setShowSetup(false);}});
  }

  var isLive=view==='live'||view==='callive';

  function renderView(){
    switch(view){
      case 'home':       return h(Home,{schede:schede,sessions:sessions,profile:profile,syncStatus:syncStatus,go:go});
      case 'start':      return h(Start,{schede:schede,go:go});
      case 'pesiblocks': return h(PesiBlocks,{schede:schede,sessions:sessions,go:go});
      case 'live':       return h(PesiLive,{bl:vp.bl,sId:vp.sId,sessions:sessions,onDone:function(s){setSessions(function(prev){return prev.concat([s]);});go('log');},go:go});
      case 'callive':    return h(CalLive,{onDone:function(s){setSessions(function(prev){return prev.concat([s]);});go('log');},go:go});
      case 'log':        return h(Log,{sessions:sessions,setSessions:setSessions,schede:schede,go:go});
      case 'det':        return h(Det,{s:vp.s,setSessions:setSessions,go:go});
      case 'stats':      return h(Stats,{sessions:sessions,schede:schede,go:go});
      case 'eser':       return h(EsDetail,{ex:vp.ex,tipo:vp.tipo,sessions:sessions,go:go});
      case 'scheda':     return h(SchedaV,{schede:schede,setSch:setSch,go:go});
      case 'nuova':      return h(NuovaScheda,{onSave:function(s){setSchede(function(prev){return prev.map(function(x){return Object.assign({},x,{attiva:false});}).concat([s]);});go('scheda');},go:go});
      case 'settings':   return h(Settings,{profile:profile,onProfile:function(pr){setProfile(pr);},go:go});
      default:           return h(Home,{schede:schede,sessions:sessions,profile:profile,go:go});
    }
  }

  return h('div',{style:{minHeight:'100vh',background:BG,color:TEXT,maxWidth:440,margin:'0 auto',position:'relative',paddingBottom:isLive?0:80}},
    renderView(),
    !isLive&&h(Nav,{cur:view,go:go})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
